services:
  # ── Tier 2: Standard Docker Databases ──────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dqe
      POSTGRES_PASSWORD: dqe_test
      POSTGRES_DB: dqe_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dqe -d dqe_test"]
      interval: 5s
      timeout: 3s
      retries: 10

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: dqe_root
      MYSQL_DATABASE: dqe_test
      MYSQL_USER: dqe
      MYSQL_PASSWORD: dqe_test
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "dqe", "-pdqe_test"]
      interval: 5s
      timeout: 3s
      retries: 15

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      CLICKHOUSE_USER: dqe
      CLICKHOUSE_PASSWORD: dqe_test
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD", "clickhouse-client", "--user", "dqe", "--password", "dqe_test", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Tier 3: Complex Docker Services ────────────────────────────
  trino:
    image: trinodb/trino:460
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "trino", "--execute", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 15
    volumes:
      - ./tests/trino/memory.properties:/etc/trino/catalog/memory.properties:ro

  risingwave:
    image: risingwavelabs/risingwave:latest
    command: playground
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD", "psql", "-h", "localhost", "-p", "4566", "-U", "root", "-d", "dev", "-c", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 15
